name: SonarQube Analysis

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  sonarqube:
    name: SonarQube Quality Analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Run coverage check
        run: npm run test:coverage

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Skip SonarCloud when token is missing
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN não configurado; etapa SonarCloud ignorada."
